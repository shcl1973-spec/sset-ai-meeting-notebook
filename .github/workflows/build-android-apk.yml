name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "install.html"
      - "styles.css"
      - "app.js"
      - "manifest.webmanifest"
      - "sw.js"
      - "app-icon.svg"
      - "capacitor.config.json"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/build-android-apk.yml"

permissions:
  contents: read

jobs:
  android-debug-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: npm run prepare:capacitor

      - name: Create Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Add microphone permission
        run: node scripts/patch-android-manifest.js

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SSET-AI-Notebook-v9-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SSET-AI-Notebook-Android-v9
          path: artifacts/*.apk
